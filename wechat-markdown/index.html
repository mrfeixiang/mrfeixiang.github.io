<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Markdown转公众号HTML</title><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><style>:root{--c:#07c160;--bg:#f4f7f5;--bd:#e5e7eb}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:#1f2937}.app{max-width:1400px;margin:auto;padding:18px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.title{font-size:23px;font-weight:800}.sub{font-size:13px;color:#6b7280;margin-top:4px}.tools{display:flex;gap:8px;flex-wrap:wrap}button,select{border:1px solid var(--bd);background:#fff;padding:10px 13px;border-radius:10px;font-size:14px}.copy{background:var(--c);color:#fff;border-color:var(--c);font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;min-height:calc(100vh - 100px)}.panel{background:#fff;border:1px solid var(--bd);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 30px #0f172a10}.bar{padding:12px 15px;border-bottom:1px solid var(--bd);font-weight:700}.hint{font-size:12px;color:#6b7280;font-weight:400}textarea{flex:1;min-height:650px;border:0;outline:0;resize:none;padding:18px;font:14px/1.75 ui-monospace,SFMono-Regular,Menlo,monospace;background:#fbfbfc}.shell{flex:1;padding:18px;background:#edf0f2;overflow:auto}.article{max-width:700px;margin:auto;background:#fff;padding:30px 26px;border-radius:12px;box-shadow:0 10px 30px #0f172a16}.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 15px;border-radius:99px;opacity:0;transition:.2s;z-index:50;white-space:nowrap}.toast.on{opacity:1}.mobile{display:none}@media(max-width:900px){body{padding-bottom:82px}.app{padding:11px}.head{align-items:flex-start;flex-direction:column}.tools{display:grid;grid-template-columns:1fr 1fr;width:100%}.tools>*{width:100%;min-height:43px}.grid{grid-template-columns:1fr}.panel:first-child textarea{min-height:48vh}.shell{padding:10px}.article{padding:23px 17px}.mobile{display:block;position:fixed;z-index:40;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));width:calc(100% - 24px);height:55px;border:0;border-radius:16px;background:var(--c);color:white;font-size:17px;font-weight:800;box-shadow:0 10px 28px #07c16055}}</style></head><body><main class="app"><header class="head"><div><div class="title">Markdown 转公众号 HTML</div><div class="sub">实时排版，一键复制富文本到微信公众号编辑器</div></div><div class="tools"><select id="theme"><option value="#07c160">清新绿</option><option value="#2563eb">科技蓝</option><option value="#ea580c">暖橙色</option><option value="#111827">深色简约</option></select><button id="demo">示例</button><button id="clear">清空</button><button class="copy" id="copy">复制公众号HTML</button></div></header><div class="grid"><section class="panel"><div class="bar">Markdown 编辑器 <span class="hint">内容自动保存在本机</span></div><textarea id="md" spellcheck="false"></textarea></section><section class="panel"><div class="bar">公众号预览 <span class="hint">已转换为内联样式</span></div><div class="shell"><article class="article" id="out"></article></div></section></div></main><button class="mobile" id="mcopy">一键复制到公众号</button><div class="toast" id="toast">已复制</div><script>const md=document.querySelector('#md'),out=document.querySelector('#out'),theme=document.querySelector('#theme'),toast=document.querySelector('#toast');const sample='# 一篇适合微信公众号的文章\n\n> 好的排版不会抢内容的风头，却会让读者更愿意读下去。\n\n## 为什么使用这个工具\n\n- Markdown 实时预览\n- 自动美化标题、引用、表格和代码\n- 手机端一键复制富文本\n- 内容只保存在你的浏览器\n\n### 表格示例\n\n| 功能 | 状态 |\n|---|---|\n| 标题与列表 | 支持 |\n| 图片与链接 | 支持 |\n| 代码与表格 | 支持 |\n\n## 写在最后\n\n把时间留给内容，把排版交给工具。';function css(e,s){Object.assign(e.style,s)}function render(){out.innerHTML=marked.parse(md.value,{gfm:true,breaks:true});const c=theme.value;css(out,{fontFamily:'-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif',fontSize:'16px',lineHeight:'1.9',color:'#1f2937',wordBreak:'break-word',letterSpacing:'.02em'});out.querySelectorAll('h1').forEach(e=>css(e,{fontSize:'28px',lineHeight:'1.4',textAlign:'center',margin:'0 0 28px',fontWeight:'800'}));out.querySelectorAll('h2').forEach(e=>css(e,{fontSize:'22px',lineHeight:'1.5',margin:'34px 0 18px',padding:'0 0 8px 13px',borderLeft:'5px solid '+c,borderBottom:'1px solid #edf0f2',fontWeight:'800'}));out.querySelectorAll('h3,h4,h5,h6').forEach(e=>css(e,{fontSize:'18px',margin:'26px 0 13px',color:c,fontWeight:'700'}));out.querySelectorAll('p').forEach(e=>css(e,{margin:'15px 0',textAlign:'justify'}));out.querySelectorAll('strong').forEach(e=>css(e,{color:c,fontWeight:'700'}));out.querySelectorAll('a').forEach(e=>css(e,{color:c,textDecoration:'none',borderBottom:'1px solid '+c}));out.querySelectorAll('blockquote').forEach(e=>css(e,{margin:'20px 0',padding:'15px 17px',background:c+'10',borderLeft:'4px solid '+c,borderRadius:'8px',color:'#4b5563'}));out.querySelectorAll('ul,ol').forEach(e=>css(e,{paddingLeft:'1.6em',margin:'15px 0'}));out.querySelectorAll('li').forEach(e=>css(e,{margin:'6px 0'}));out.querySelectorAll('img').forEach(e=>css(e,{display:'block',maxWidth:'100%',height:'auto',margin:'20px auto',borderRadius:'9px'}));out.querySelectorAll('pre').forEach(e=>css(e,{margin:'18px 0',padding:'15px',background:'#0f172a',color:'#e5e7eb',borderRadius:'9px',overflowX:'auto',fontSize:'14px',lineHeight:'1.65'}));out.querySelectorAll('code').forEach(e=>{if(e.parentElement.tagName!=='PRE')css(e,{padding:'2px 5px',background:c+'12',color:c,borderRadius:'5px',fontSize:'.92em'})});out.querySelectorAll('table').forEach(e=>css(e,{width:'100%',borderCollapse:'collapse',margin:'18px 0',fontSize:'14px'}));out.querySelectorAll('th').forEach(e=>css(e,{padding:'9px',background:c+'12',border:'1px solid #dfe3e8'}));out.querySelectorAll('td').forEach(e=>css(e,{padding:'9px',border:'1px solid #dfe3e8'}));localStorage.wxmd=md.value;localStorage.wxcolor=c}function html(){const x=out.cloneNode(true);x.removeAttribute('id');x.removeAttribute('class');return x.outerHTML}function msg(t){toast.textContent=t;toast.classList.add('on');setTimeout(()=>toast.classList.remove('on'),1600)}async function copy(){render();const h=html();try{await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([h],{type:'text/html'}),'text/plain':new Blob([out.innerText],{type:'text/plain'})})]);msg('已复制富文本，可粘贴到公众号')}catch(e){try{const r=document.createRange();r.selectNodeContents(out);const s=getSelection();s.removeAllRanges();s.addRange(r);const ok=document.execCommand('copy');s.removeAllRanges();if(ok)return msg('已复制富文本，可粘贴到公众号')}catch(_){}try{await navigator.clipboard.writeText(h);msg('已复制 HTML 源码')}catch(_){msg('请长按预览内容复制')}}}md.value=localStorage.wxmd||sample;theme.value=localStorage.wxcolor||'#07c160';md.oninput=render;theme.onchange=render;document.querySelector('#copy').onclick=copy;document.querySelector('#mcopy').onclick=copy;document.querySelector('#demo').onclick=()=>{md.value=sample;render()};document.querySelector('#clear').onclick=()=>{md.value='';render()};render();</script></body></html>
